<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Control a blooming lily with hand gestures in real-time using your webcam">
    <title>Lily Bloom — Hand Gesture Control</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <!-- Webcam feed -->
        <video id="webcam" autoplay playsinline></video>

        <!-- Canvas overlay for rendering flower + hand skeleton -->
        <canvas id="canvas"></canvas>

        <!-- Subtle vignette -->
        <div class="vignette"></div>

        <!-- Loading screen -->
        <div class="loading-overlay" id="loading">
            <div class="loading-flower"></div>
            <div class="loading-text">Initializing Lily Bloom</div>
            <div class="loading-subtext">Allow camera access when your phone asks</div>
        </div>

        <!-- Mobile portrait guidance -->
        <div class="orientation-hint" aria-live="polite">
            <div class="orientation-symbol">↻</div>
            <div class="orientation-title">Rotate your phone</div>
            <div class="orientation-copy">Turn your phone horizontally and allow camera access to see the lily clearly.</div>
        </div>

        <!-- Instructions -->
        <div class="instructions" id="instructions">
            <span>Left hand pinch</span> opens petals &nbsp;·&nbsp;
            <span>Right hand pinch</span> grows the stem &nbsp;·&nbsp;
            <span>Sway hands</span> to create wind
        </div>
    </div>

    <!-- MediaPipe Hands -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4/hands.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils@0.3/camera_utils.js" crossorigin="anonymous"></script>

    <!-- Application -->
    <script src="app.js"></script>
</body>
</html>
